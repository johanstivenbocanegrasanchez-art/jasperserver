# Property that determines the Hibernate dialect
metadata.hibernate.dialect=com.jaspersoft.hibernate.dialect.PostgresqlNoBlobDialect

# jasperserver repo db settings
# CI credentials removed (SECURITY C-0 QW-1 2026-05-27) — production uses JNDI below
metadata.jdbc.driverClassName=
metadata.jdbc.url=
metadata.jdbc.username=
metadata.jdbc.password=
metadata.jdbc.password.escapeXML=

metadata.jndi=jdbc/jasperserver

metadata.database.generate=true

# jasperserver audit db settings
# CI credentials removed (SECURITY C-0 QW-1 2026-05-27) — production uses JNDI below
audit.jdbc.driverClassName=
audit.jdbc.url=
audit.jdbc.username=
audit.jdbc.password=
audit.jdbc.password.escapeXML=

audit.jndi=jdbc/jasperserverAudit

# foodmart db settings — demo/sample dataset, CI credentials removed
foodmart.jdbc.driverClassName=
foodmart.jdbc.url=
foodmart.jdbc.username=
foodmart.jdbc.password=
foodmart.jdbc.password.escapeXML=

foodmart.jndi=jdbc/foodmart

# sugarcrm db settings — demo/sample dataset, CI credentials removed
sugarcrm.jdbc.driverClassName=
sugarcrm.jdbc.url=
sugarcrm.jdbc.username=
sugarcrm.jdbc.password=
sugarcrm.jdbc.password.escapeXML=

sugarcrm.jndi=jdbc/sugarcrm

# sugarcrm is also referenced as test in unit tests — CI credentials removed
test.jdbc.driverClassName=
test.jdbc.url=
test.jdbc.username=
test.jdbc.password=
test.jdbc.password.escapeXML=

test.jndi=jdbc/sugarcrm

# flag used to skip some unit tests or to use uppercase schema files
test.databaseFlavor=postgresql
test.createMinimalData=${test.set.createMinimalData}
foodmart.upperCaseNames=false
sugarcrm.upperCaseNames=false

# used to add parms to tomcat datasource: context.xml
# todo: still used?
datasource.extra.params=

# to disable console logging for jbm2ddl task
hbm2ddl.console=false

# Tomcat JNDI Resource factory attribute
tomcat.basic.datasource.factory=${tomcatBasicDatasourceFactory}

